backend:
  name: git-gateway
  repo: btcpeso/SimpleFoods-website # Palitan mo 'to (e.g., btcpeso/simplefoods)
  branch: main

media_folder: "SimpleFoods/images" # Dito automatic ise-save ni Decap ang mga in-upload na pictures ng ulam
public_folder: "/images"

collections:
  - name: "party_trays"
    label: "Party Food Trays"
    delete: false
    format: "json"
    files:
      # --- PORK ---
      - file: "SimpleFoods/data/menu/pork.json"
        label: "Pork Category"
        name: "pork"
        fields:
          - { label: "Category Price", name: "price", widget: "string" }
          - label: "Dishes List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }

      # --- BEEF ---
      - file: "SimpleFoods/data/menu/beef.json"
        label: "Beef Category"
        name: "beef"
        fields:
          - { label: "Category Price", name: "price", widget: "string" }
          - label: "Dishes List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }

      # --- CHICKEN ---
      - file: "SimpleFoods/data/menu/chicken.json"
        label: "Chicken Category"
        name: "chicken"
        fields:
          - { label: "Category Price", name: "price", widget: "string" }
          - label: "Dishes List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }

      # --- VEGETABLES ---
      - file: "SimpleFoods/data/menu/vegetables.json"
        label: "Vegetables Category"
        name: "vegetables"
        fields:
          - { label: "Category Price", name: "price", widget: "string" }
          - label: "Dishes List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }

      # --- FISH ---
      - file: "SimpleFoods/data/menu/fish.json"
        label: "Fish Category"
        name: "fish"
        fields:
          - { label: "Category Price", name: "price", widget: "string" }
          - label: "Dishes List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }

      # --- PASTA ---
      - file: "SimpleFoods/data/menu/pasta.json"
        label: "Pasta Category"
        name: "pasta"
        fields:
          - { label: "Category Price", name: "price", widget: "string" }
          - label: "Dishes List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }

      # --- NOODLES ---
      - file: "SimpleFoods/data/menu/noodles.json"
        label: "Noodles Category"
        name: "noodles"
        fields:
          - { label: "Category Price", name: "price", widget: "string" }
          - label: "Dishes List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }

      # --- DESSERT ---
      - file: "SimpleFoods/data/menu/dessert.json"
        label: "Dessert Category"
        name: "dessert"
        fields:
          - { label: "Category Price", name: "price", widget: "string" }
          - label: "Dishes List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Dish Name", name: "name", widget: "string" }
              - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }

      # --- CREW PACKAGES ---
      - file: "SimpleFoods/data/menu/crew_packages.json"
        label: "Crew Packages Setup"
        name: "crew_packages"
        fields:
          - label: "Packages List"
            name: "packages"
            widget: "list"
            fields:
              - { label: "Package Name", name: "name", widget: "string" }
              - { label: "Price Label", name: "price", widget: "string" }
              - { label: "Is Best Seller?", name: "bestseller", widget: "boolean", default: false }
              - { label: "Inclusions (Line by line)", name: "inclusions", widget: "list", field: { widget: "string" } }

      # --- CREW SIDES & ENTREES ---
      - file: "SimpleFoods/data/menu/crew_sides.json"
        label: "Crew Entrées & Sides"
        name: "crew_sides"
        fields:
          - label: "Menu Categories"
            name: "categories"
            widget: "list"
            fields:
              - { label: "Category Title", name: "title", widget: "string" }
              - { label: "Extra Badge Text (e.g., +10 PHP)", name: "extra", widget: "string", required: false }
              - { label: "Is Special Upgrade Card Styling?", name: "isUpgrade", widget: "boolean", default: false }
              - label: "Items List"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Dish Name", name: "name", widget: "string" }
                  - { label: "Is Best Seller? (***)", name: "bestseller", widget: "boolean", default: false }        